name: release
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (example: v0.1.0)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: vars
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${TAG}" =~ ^v[0-9]+(\.[0-9]+){1,2}(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid tag format: ${TAG}"
            exit 1
          fi

          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

      - name: Create tag when manually dispatched
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git rev-parse -q --verify "refs/tags/${TAG}" > /dev/null; then
            echo "Tag ${TAG} already exists."
          else
            git tag "${TAG}"
            git push origin "${TAG}"
          fi

      - name: Validate changelog contains release tag
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          if [ ! -f CHANGELOG.md ]; then
            echo "CHANGELOG.md is required before a release."
            exit 1
          fi

          if ! grep -Eq "^## \\[?${TAG}\\]?" CHANGELOG.md; then
            echo "CHANGELOG.md must contain a section for ${TAG}."
            exit 1
          fi

      - name: Build source archive
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          git archive --format=zip --output="khl-portfolio-lab-${TAG}.zip" "${TAG}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          files: khl-portfolio-lab-${{ steps.vars.outputs.tag }}.zip
          generate_release_notes: true
