name: ci-python
on:
  push:
    paths:
      - "**/*.py"
      - "requirements.txt"
      - ".github/workflows/ci-python.yml"
  pull_request:
    paths:
      - "**/*.py"
      - "requirements.txt"
      - ".github/workflows/ci-python.yml"

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies for pyodbc
        run: |
          sudo apt-get update
          sudo apt-get install -y unixodbc-dev

      - name: Install python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Python syntax smoke check
        run: |
          python -m compileall -q analytics ai-assistant scripts trading-sim

      - name: Run unit tests
        run: |
          python -m unittest discover -s trading-sim/tests -p "test_*.py" -q
          python -m unittest discover -s analytics/tests -p "test_*.py" -q
          python -m unittest discover -s scripts/tests -p "test_*.py" -q
          python -m unittest discover -s ai-assistant/tests -p "test_*.py" -q
