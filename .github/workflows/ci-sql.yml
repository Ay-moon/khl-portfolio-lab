name: ci-sql
on:
  push:
    paths:
      - "data-platform/sql/**/*.sql"
      - "scripts/validate_sql.py"
      - ".github/workflows/ci-sql.yml"
  pull_request:
    paths:
      - "data-platform/sql/**/*.sql"
      - "scripts/validate_sql.py"
      - ".github/workflows/ci-sql.yml"

jobs:
  validate-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate SQL files
        run: python scripts/validate_sql.py
